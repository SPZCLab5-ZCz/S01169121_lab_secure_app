name: Perform Mixeway Scan
on: [push]

jobs:
  mixeway-scan:
    name: Mixeway Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - name: Prepare variables
        id: vars
        shell: bash
        run: |
          echo "::set-output name=branch::$(echo ${GITHUB_REF#refs/heads/})"
          echo "::set-output name=sha_short::$(git rev-parse HEAD)"
      - name: Prepare Mixeway docker image
        run: |
          docker pull mixeway/scanner:latest
      - name: Run Scan
        run: |
          docker run -e OSS_USERNAME="sierranightray@gmail.com" -e OSS_KEY="sonatype_pat_afMJ86rBjHtP5q-5RaMpuDuJCXcUuM8S0piLKy-R_OJ2L4py" -e MIXEWAY_URL="https://hub.mixeway.io" -e MIXEWAY_KEY="00444202-de98-491e-ad7a-5008e818ef64" -e MIXEWAY_PROJECT_ID="198" -e MIXEWAY_PROJECT_NAME="S01169121_lab_secure_app" -e MODE=STANDALONE -e COMMIT_ID=${{ steps.vars.outputs.sha_short }} -e BRANCH=${{ steps.vars.outputs.branch }} -v $(pwd):/opt/sources mixeway/scanner:latest
